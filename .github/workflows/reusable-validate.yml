name: reusable-validate

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies without provider setup hooks
        run: npm ci --ignore-scripts

      - name: Run deterministic repository validation
        run: npm run agent-check
